name: Checkout Agent

on:
  workflow_dispatch:
    inputs:
      only_store:
        description: "Optional store name. Leave empty to run all active stores."
        required: false
        default: ""
      confirmed:
        description: "Type true to confirm creating TEST orders."
        required: true
        default: "false"

  push:
    branches:
      - main
    paths:
      - ".agent-triggers/checkout-trigger.json"

jobs:
  run-checkout-agent:
    if: ${{ github.event_name == 'push' || github.event.inputs.confirmed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    env:
      WEBAPP_URL: ${{ secrets.WEBAPP_URL }}
      HEADLESS: "false"
      SLOWMO_MS: "1000"
      ONLY_STORE: ""
      DEBUG_SCREENSHOTS: "true"
      DEBUG_DIR: "debug-screenshots"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Load manual trigger input
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          echo "ONLY_STORE=${{ github.event.inputs.only_store }}" >> "$GITHUB_ENV"

      - name: Load agent trigger input
        if: ${{ github.event_name == 'push' }}
        run: |
          node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync('.agent-triggers/checkout-trigger.json','utf8')); console.log('ONLY_STORE=' + (j.only_store || ''))" >> "$GITHUB_ENV"

      - name: Show selected store
        run: |
          echo "ONLY_STORE=$ONLY_STORE"
          if [ -z "$ONLY_STORE" ]; then
            echo "Running all active stores from sheet"
          else
            echo "Running only store: $ONLY_STORE"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Test WEBAPP_URL
        run: |
          echo "Testing WEBAPP_URL..."
          echo "WEBAPP_URL length: ${#WEBAPP_URL}"
          curl -L -s -o webapp-response.txt -w "HTTP_STATUS=%{http_code}\n" "$WEBAPP_URL?action=stores"
          echo "Response preview:"
          head -c 500 webapp-response.txt
          echo ""

      - name: Patch Sutra COD safety
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'src/run.js';
          const before = "if (await hasVisibleCardFields(page)) {\n    throw new Error('Visible card fields are present after Cash on Delivery selection. Store stopped for payment safety.');\n  }";
          const after = "if (!selectedPayment && await hasVisibleCardFields(page)) {\n    throw new Error('Visible card fields are present without a selected Cash on Delivery payment method. Store stopped for payment safety.');\n  }";
          const source = fs.readFileSync(path, 'utf8');
          if (!source.includes(before)) {
            throw new Error('Expected COD safety block was not found');
          }
          fs.writeFileSync(path, source.replace(before, after));
          NODE
          node --check src/run.js

      - name: Run checkout agent
        run: xvfb-run -a npm run run

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkout-debug-screenshots
          path: debug-screenshots/
          if-no-files-found: ignore
          retention-days: 1
