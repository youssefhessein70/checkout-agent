name: Checkout Agent

on:
  workflow_dispatch:
    inputs:
      only_store:
        description: "Optional store name. Leave empty to run all active stores."
        required: false
        default: ""
      confirmed:
        description: "Type true to confirm creating TEST orders."
        required: true
        default: "false"

jobs:
  run-checkout-agent:
    if: ${{ github.event.inputs.confirmed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    env:
      WEBAPP_URL: ${{ secrets.WEBAPP_URL }}
      HEADLESS: "false"
      SLOWMO_MS: "1000"
      ONLY_STORE: ${{ github.event.inputs.only_store }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Test WEBAPP_URL
        run: |
          echo "Testing WEBAPP_URL..."
          echo "WEBAPP_URL length: ${#WEBAPP_URL}"
          curl -L -s -o webapp-response.txt -w "HTTP_STATUS=%{http_code}\n" "$WEBAPP_URL?action=stores"
          echo "Response preview:"
          head -c 500 webapp-response.txt
          echo ""

      - name: Run checkout agent
        run: xvfb-run -a npm run run



